<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Consultant Dashboard - Shree Lakshmi Astro</title>
  <link rel="stylesheet" href="./styles.css?v=3">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-space);
      color: var(--ink-light);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    
    .workspace-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    .sidebar {
      width: 320px;
      border-right: 1px solid var(--line);
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      color: var(--ink-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }
    
    #q-count {
      background: var(--bg-surface);
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--ink-dim);
    }
    
    .queue-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      margin: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .queue-item {
      padding: 16px;
      border: 1px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
    }
    
    .queue-item:hover {
      background: var(--bg-surface);
      border-color: var(--line);
    }
    
    .queue-item.active {
      background: var(--bg-surface);
      border-color: var(--line);
      box-shadow: 0 0 0 1px var(--line);
    }
    
    .queue-item h4 {
      margin: 0 0 4px 0;
      font-size: 0.95rem;
      color: var(--ink-light);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
    }
    
    .queue-item p {
      margin: 0;
      font-size: 0.8rem;
      color: var(--ink-dim);
      line-height: 1.4;
    }
    
    .main-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 40px;
      background: var(--bg-space);
      position: relative;
    }
    
    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--ink-dim);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      max-width: 300px;
      line-height: 1.5;
    }
    
    .detail-card {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(46, 43, 95, 0.08);
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }
    
    .detail-card h2 {
      font-family: 'Marcellus', serif;
      color: var(--ink-light);
      font-size: 1.5rem;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    
    .question-box {
      background: var(--bg-surface);
      border: 1px solid var(--line);
      padding: 20px;
      border-radius: 12px;
      line-height: 1.6;
      margin: 24px 0;
      font-size: 0.95rem;
      color: var(--ink-light);
    }
    
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 16px;
      border: 1px solid var(--line);
      background: var(--bg-surface);
      color: var(--ink-light);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 180px;
      margin-bottom: 24px;
      transition: all 0.2s ease;
    }
    
    textarea:focus {
      border-color: var(--ink-light);
      outline: none;
      box-shadow: 0 0 0 3px rgba(46,43,95,0.05);
      background: var(--bg-panel);
    }
    
    .actions { 
      display: flex; 
      gap: 12px; 
      justify-content: flex-end;
    }
    
    .btn-primary {
      background: var(--ink-light);
      color: var(--bg-space);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    
    .chart-previews {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 24px 0;
    }
    
    .chart-box {
      border: 1px solid var(--line);
      padding: 20px;
      border-radius: 12px;
      font-size: 0.85rem;
      background: var(--bg-surface);
    }
    
    .chart-box pre {
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-light);
      opacity: 0.8;
      overflow-x: auto;
    }
  </style>
