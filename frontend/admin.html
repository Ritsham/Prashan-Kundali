<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Kundali Studio</title>
    <link rel="stylesheet" href="./styles.css?v=2">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 30px;
        }
        .admin-header {
            margin-bottom: 30px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--line);
        }
        .admin-header h1 {
            font-family: 'Cinzel', serif;
            color: var(--ink-light);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }
        .admin-header p {
            color: var(--ink-dim);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
        }
        .pending-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .applicant-card {
            background: var(--bg-surface);
            padding: 24px 28px;
            border-radius: 16px;
            border: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        .applicant-card:hover {
            border-color: rgba(46,43,95,0.15);
        }
        .applicant-info h3 {
            font-family: 'Inter', sans-serif;
            margin-bottom: 12px;
            color: var(--ink-light);
            font-weight: 600;
            font-size: 1.15rem;
        }
        .applicant-info p {
            font-family: 'Inter', sans-serif;
            color: var(--ink-dim);
            font-size: 0.9rem;
            margin: 8px 0;
            line-height: 1.5;
        }
        .applicant-info strong {
            color: var(--ink-light);
            font-weight: 600;
        }
        .action-btns {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn-approve, .btn-reject {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            border: none;
        }
        .btn-approve {
            background: var(--ink-light);
            color: var(--bg-space);
        }
        .btn-approve:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(46,43,95,0.1);
        }
        .btn-reject {
            background: transparent;
            color: var(--ink-dim);
            border: 1px solid var(--line);
        }
        .btn-reject:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>
    <nav class="global-navbar">
        <div class="logo-text">
            ॐ <span class="highlight">Admin</span> Studio
        </div>
        <div class="nav-links">
            <a href="./index.html" class="nav-link-btn">Home</a>
            <button type="button" id="btn-logout" class="small-btn">Logout</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="admin-container">
            <div class="admin-header">
                <h1>Practitioner Verification Queue</h1>
                <p>Verify practitioner profiles, credentials, bios, and websites before granting access to community boards.</p>
            </div>
            
            <div class="pending-list" id="pending-list">
                <!-- Applications load here -->
            </div>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        async function loadPending() {
            const token = localStorage.getItem('supabase_token');
            if (!token) {
                window.location.href = './index.html';
                return;
            }

            try {
                const res = await fetch('/api/admin/pending-astrologers', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 403) {
                    alert("Unauthorized. Admin access required.");
                    window.location.href = './index.html';
                    return;
                }

                const data = await res.json();
                const list = document.getElementById('pending-list');
                
                if (!data.pending || data.pending.length === 0) {
                    list.innerHTML = '<p style="color: var(--ink-dim); text-align: center; margin-top: 40px;">No pending applications in queue at the moment.</p>';
                    return;
                }

                list.innerHTML = data.pending.map(p => `
                    <div class="applicant-card" id="card-${p.user_id}">
                        <div class="applicant-info">
                            <h3>${p.name || 'Unknown'} (${p.email})</h3>
                            <p><strong>Experience:</strong> ${p.experience_years} years</p>
                            <p><strong>Expertise:</strong> ${p.expertise_areas.join(', ')}</p>
                            <p><strong>Bio:</strong> ${p.bio || 'N/A'}</p>
                            <p><strong>Portal:</strong> ${p.social_links && p.social_links.website ? `<a href="${p.social_links.website}" target="_blank" style="color:var(--saffron-gold); text-decoration: underline;">${p.social_links.website}</a>` : 'N/A'}</p>
                        </div>
                        <div class="action-btns">
                            <button class="btn-approve" onclick="verifyUser('${p.user_id}', 'approve')">Approve</button>
                            <button class="btn-reject" onclick="verifyUser('${p.user_id}', 'reject')">Reject</button>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error(err);
            }
        }

        window.verifyUser = async function(userId, action) {
            const token = localStorage.getItem('supabase_token');
            try {
                const res = await fetch(`/api/admin/verify-astrologer?user_id=${userId}&action=${action}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    document.getElementById(`card-${userId}`).remove();
                } else {
                    const data = await res.json();
                    alert(`Error: ${data.detail || 'Failed to update'}`);
                }
            } catch (err) {
                console.error(err);
                alert('Error updating user');
            }
        };

        document.getElementById('btn-logout').addEventListener('click', async () => {
            const configRes = await fetch('/api/config');
            const config = await configRes.json();
            const supabase = createClient(config.supabaseUrl, config.supabaseAnonKey);
            await supabase.auth.signOut();
            localStorage.removeItem('supabase_token');
            window.location.href = './index.html';
        });

        document.addEventListener('DOMContentLoaded', loadPending);
    </script>
</body>
</html>
