<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrologer Community - Kundali Studio</title>
    <link rel="stylesheet" href="./styles.css?v=2">
    <link rel="stylesheet" href="./community.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="community-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>ॐ Astro Board</h2>
                <button id="change-name-btn" class="small-btn">Set Name</button>
            </div>

            <div class="channels-list">
                <div class="channels-title">Channels</div>
                <ul id="channel-list">
                    <!-- Channels will be populated here -->
                </ul>
            </div>

            <div class="sidebar-footer">
                <a href="./index.html">← Return to Portal</a>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <h3 id="current-channel-name"># general</h3>
            </div>

            <div class="messages-container" id="messages-container">
                <!-- Messages will be populated here -->
            </div>

            <div class="chat-input-container">
                <form id="message-form">
                    <label for="image-upload" class="upload-btn" title="Upload Image">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </label>
                    <input type="file" id="image-upload" accept="image/*" style="display: none;">

                    <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">

                    <button type="submit" class="send-btn" title="Send message">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
                <div id="image-preview-container" style="display: none;">
                    <img id="image-preview" src="" alt="Preview">
                    <button id="clear-image-btn">✕</button>
                </div>
            </div>
        </div>

        <!-- Thread Sidebar (Right) -->
        <div class="thread-sidebar" id="thread-sidebar">
            <div class="thread-header">
                <h3>Thread</h3>
                <button id="close-thread-btn" class="close-btn">✕</button>
            </div>

            <div class="thread-original-message" id="thread-original-message">
                <!-- Original message goes here -->
            </div>

            <div class="thread-replies" id="thread-replies">
                <!-- Replies go here -->
            </div>

            <div class="thread-input-container">
                <form id="thread-form">
                    <input type="text" id="thread-input" placeholder="Reply..." required autocomplete="off">
                    <button type="submit" class="send-btn" title="Send Reply">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script type="module" src="./community.js"></script>
</body>

</html>
