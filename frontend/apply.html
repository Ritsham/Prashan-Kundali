<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply as Astrologer - Kundali Studio</title>
    <link rel="stylesheet" href="./styles.css?v=2">
    <style>
        .apply-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 40px;
            background: var(--bg-surface);
            border: 1px solid var(--line);
            border-radius: 16px;
        }
        .apply-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .apply-header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.1rem;
            color: var(--ink-light);
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .apply-header p {
            color: var(--ink-dim);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--ink-light);
            font-size: 0.88rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--bg-panel);
            color: var(--ink-light);
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--ink-light);
            outline: none;
            box-shadow: 0 0 0 3px rgba(46,43,95,0.05);
            background: var(--bg-surface);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--ink-light);
            color: var(--bg-space);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }
        .btn-submit:hover {
            transform: scale(1.01);
            box-shadow: 0 4px 12px rgba(46,43,95,0.1);
        }
    </style>
</head>
<body>
    <nav class="global-navbar">
        <div class="logo-text">
            ॐ <span class="highlight">Kundali</span> Studio
        </div>
        <div class="nav-links">
            <a href="./index.html" class="nav-link-btn">Home</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="apply-container">
            <div class="apply-header">
                <h1>Practitioner Registry</h1>
                <p>Register your credentials to gain verified status and participate in client consultation channels.</p>
            </div>
            
            <form id="applyForm">
                <div class="form-group">
                    <label for="experience">Astrological Experience (Years)</label>
                    <input type="number" id="experience" name="experience" min="0" required placeholder="e.g. 5">
                </div>
                
                <div class="form-group">
                    <label for="expertise">Specialties & Traditions (Comma separated)</label>
                    <input type="text" id="expertise" name="expertise" placeholder="e.g. Vedic, KP System, Ashtakavarga" required>
                </div>
                
                <div class="form-group">
                    <label for="social">Professional Portal / Website URL</label>
                    <input type="url" id="social" name="social" placeholder="https://astrologerwebsite.com">
                </div>
                
                <div class="form-group">
                    <label for="bio">Professional Summary / Bio</label>
                    <textarea id="bio" name="bio" rows="4" placeholder="Briefly describe your training, lineages, and practical methodology..." required></textarea>
                </div>
                
                <button type="submit" class="btn-submit">Submit Credentials</button>
            </form>
            <div id="statusMessage" style="margin-top: 24px; text-align: center; font-size: 0.95rem; font-weight: 600;"></div>
        </div>
    </main>

    <script>
        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('supabase_token');
            if (!token) {
                alert('Please sign in first to apply!');
                return;
            }

            const payload = {
                experience_years: parseInt(document.getElementById('experience').value),
                expertise_areas: document.getElementById('expertise').value.split(',').map(s => s.trim()),
                social_links: { website: document.getElementById('social').value },
                bio: document.getElementById('bio').value
            };

            try {
                const res = await fetch('/api/astrologer/apply', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('statusMessage').innerHTML = '<span style="color: #10b981;">🕉️ Credentials submitted successfully. Administrative review will complete in 24-48 hours.</span>';
                    document.getElementById('applyForm').reset();
                } else {
                    document.getElementById('statusMessage').innerHTML = `<span style="color: #ef4444;">Error: ${data.detail}</span>`;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('statusMessage').innerHTML = '<span style="color: #ef4444;">Failed to submit application.</span>';
            }
        });
    </script>
</body>
</html>
