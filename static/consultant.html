<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Consultant Dashboard - Prashna Kundali</title>
  <style>
    :root {
      --color-background: #fdfdfc;
      --color-surface: #ffffff;
      --color-on-surface: #1e1e1e;
      --color-outline: #e5e5e5;
      --color-primary: #0066cc;
      --color-on-primary: #ffffff;
      --color-error: #cc0000;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-background);
      color: var(--color-on-surface);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      width: 320px;
      border-right: 1px solid var(--color-outline);
      background: var(--color-surface);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--color-outline);
      font-weight: bold;
      display: flex;
      justify-content: space-between;
    }
    .queue-list {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .queue-item {
      padding: 16px;
      border-bottom: 1px solid var(--color-outline);
      cursor: pointer;
    }
    .queue-item:hover {
      background: #f5f5f5;
    }
    .queue-item.active {
      background: #eef5ff;
      border-left: 4px solid var(--color-primary);
    }
    .queue-item h4 { margin: 0 0 4px 0; font-size: 14px; }
    .queue-item p { margin: 0; font-size: 12px; color: #666; }
    
    .main-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px;
    }
    .empty-state {
      margin: auto;
      text-align: center;
      color: #999;
    }
    
    .detail-card {
      background: var(--color-surface);
      border: 1px solid var(--color-outline);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .question-box {
      background: #f8f9fa;
      padding: 16px;
      border-radius: 6px;
      font-style: italic;
      margin: 16px 0;
    }
    
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid var(--color-outline);
      border-radius: 6px;
      font-family: inherit;
      resize: vertical;
      min-height: 120px;
      margin-bottom: 16px;
    }
    button {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-danger { background: white; color: var(--color-error); border: 1px solid var(--color-error); }
    
    .actions { display: flex; gap: 12px; }
    .chart-previews {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    .chart-box {
      border: 1px solid var(--color-outline);
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      background: #fafafa;
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <span>Live Queue</span>
      <span id="q-count">0/20</span>
    </div>
    <ul class="queue-list" id="queue-list">
      <!-- Injected via JS -->
    </ul>
  </aside>

  <main class="main-view" id="main-view">
    <div class="empty-state">Select a question from the queue to start reading.</div>
  </main>

  <script src="/consultant.js"></script>
</body>
</html>
